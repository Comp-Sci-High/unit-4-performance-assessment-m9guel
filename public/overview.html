<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>InstaClone | Overview</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>

  <!-- Navigation -->
  <nav class="navbar">
    <h1 class="logo">InstaClone</h1>
    <a href="/" class="nav-button">Home</a>
  </nav>

  <!-- Posts Container -->
  <section class="posts-container">

    <!-- Repeatable Post Component -->
    <div class="post">
      <div class="post-header">
        <img src="images/profile1.jpg" class="profile-img" alt="Profile">
        <span class="username">miguel_codes</span>
      </div>

      <img src="images/post1.jpg" class="post-image" alt="Post Image">

      <div class="post-content">
        <p class="likes">87 likes</p>
        <p class="caption">miguel_codes Building my Instagram clone 🚀</p>
      </div>
    </div>

    <!-- Repeatable Post Component -->
    <div class="post">
      <div class="post-header">
        <img src="images/profile2.jpg" class="profile-img" alt="Profile">
        <span class="username">frontend_fan</span>
      </div>

      <img src="images/post2.jpg" class="post-image" alt="Post Image">

      <div class="post-content">
        <p class="likes">45 likes</p>
        <p class="caption">frontend_fan Practicing my CSS layouts 🎨</p>
      </div>
    </div>

  </section>

</body>
</html>
